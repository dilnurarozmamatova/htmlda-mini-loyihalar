<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Smart ToDo</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
      margin-top: 50px;
    }

  
    h1 {
      color: #333;
    }

    input {
      padding: 10px;
      width: 200px;
      margin: 5px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }


    

    li {
      background: white;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
      border-radius: 5px;
    }


    

    .done {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>
<body>

  <h1>📝 Smart ToDo</h1>

  <input type="text" id="taskInput" placeholder="Vazifa yoz...">
  <button onclick="addTask()">Qo‘shish</button>

  <br>


  
  <input type="text" id="search" placeholder="Qidirish..." onkeyup="searchTask()">

  <ul id="taskList"></ul>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function renderTasks(list = tasks) {
      const taskList = document.getElementById("taskList");
      taskList.innerHTML = "";

      list.forEach((task, index) => {
        const li = document.createElement("li");
        li.textContent = task.text;

        if (task.done) li.classList.add("done");

        li.onclick = () => toggleTask(index);

        const delBtn = document.createElement("button");
        delBtn.textContent = "❌";

        delBtn.onclick = (e) => {
          e.stopPropagation();
          deleteTask(index);
        };

        li.appendChild(delBtn);
        taskList.appendChild(li);
      });

      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function addTask() {
      const input = document.getElementById("taskInput");

      if (!input.value) return;

      tasks.push({ text: input.value, done: false });
      input.value = "";

      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      renderTasks();
    }

    function toggleTask(index) {
      tasks[index].done = !tasks[index].done;
      renderTasks();
    }

    function searchTask() {
      const value = document.getElementById("search").value.toLowerCase();

      const filtered = tasks.filter(t =>
        t.text.toLowerCase().includes(value)
      );

      renderTasks(filtered);
    }

    renderTasks();
  </script>

</body>
</html>
