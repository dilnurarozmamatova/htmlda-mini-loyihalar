<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>

<style>
body {
    font-family: Arial;
    background: #121212;
    color: white;
    text-align: center;
    padding: 40px;
}

.container {
    max-width: 400px;
    margin: auto;
    background: #1e1e1e;
    padding: 20px;
    border-radius: 10px;
}

input, button {
    padding: 10px;
    margin: 10px;
    width: 80%;
}

#password {
    background: black;
    color: lime;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h2>🔐 Password Generator</h2>

    <input type="number" id="length" placeholder="Parol uzunligi (masalan 12)">
    <br>

    <button onclick="generatePassword()">Yaratish</button>
    <button onclick="copyPassword()">Nusxa olish</button>

    <input type="text" id="password" readonly placeholder="Parol shu yerda chiqadi">
</div>

<script>
function generatePassword() {
    const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()";
    let length = document.getElementById("length").value;
    let password = "";

    if (length <= 0) return;

    for (let i = 0; i < length; i++) {
        password += chars[Math.floor(Math.random() * chars.length)];
    }

    document.getElementById("password").value = password;
}

function copyPassword() {
    let pass = document.getElementById("password");
    pass.select();
    document.execCommand("copy");
    alert("Nusxa olindi!");
}
</script>

</body>
</html>
